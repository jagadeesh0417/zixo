<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <radialGradient id="i6Bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3A2218"/>
      <stop offset="100%" stop-color="#1A0E08"/>
    </radialGradient>
    <radialGradient id="i6Cookie1" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8C07A"/>
      <stop offset="40%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#7A5220"/>
    </radialGradient>
    <radialGradient id="i6Cookie2" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#B8453A"/>
      <stop offset="40%" stop-color="#8B2C22"/>
      <stop offset="100%" stop-color="#521610"/>
    </radialGradient>
    <radialGradient id="i6Cookie3" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F5D98E"/>
      <stop offset="40%" stop-color="#D9B34A"/>
      <stop offset="100%" stop-color="#A88028"/>
    </radialGradient>
    <radialGradient id="chipGrad" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#3D1C02"/>
      <stop offset="60%" stop-color="#2A1200"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </radialGradient>
    <filter id="i6Shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="chipShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="i6Warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,200,120,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,200,120,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#i6Bg)"/>
  <rect width="600" height="600" fill="url(#i6Warm)"/>
  <ellipse cx="300" cy="480" rx="240" ry="40" fill="rgba(255,255,255,0.02)"/>

  <!-- Cookie crumbs scattered -->
  <g fill="#D4A853" opacity="0.3">
    <circle cx="150" cy="460" r="3"/>
    <circle cx="200" cy="475" r="2"/>
    <circle cx="420" cy="465" r="2.5"/>
    <circle cx="460" cy="455" r="1.8"/>
    <circle cx="350" cy="470" r="2"/>
    <circle cx="250" cy="460" r="1.5"/>
  </g>

  <!-- Cookies in a row -->
  <ellipse cx="160" cy="360" rx="100" ry="36" fill="url(#i6Cookie1)" filter="url(#i6Shadow)"/>
  <ellipse cx="300" cy="350" rx="105" ry="38" fill="url(#i6Cookie2)" filter="url(#i6Shadow)"/>
  <ellipse cx="440" cy="360" rx="100" ry="36" fill="url(#i6Cookie3)" filter="url(#i6Shadow)"/>

  <!-- Chips on cookie 1 -->
  <g fill="url(#chipGrad)" filter="url(#chipShadow)">
    <ellipse cx="130" cy="355" rx="7" ry="5" transform="rotate(-10,130,355)"/>
    <ellipse cx="180" cy="350" rx="8" ry="6" transform="rotate(15,180,350)"/>
    <ellipse cx="155" cy="370" rx="6" ry="4" transform="rotate(-20,155,370)"/>
  </g>

  <!-- Highlights -->
  <ellipse cx="140" cy="340" rx="30" ry="12" fill="rgba(255,235,190,0.05)" transform="rotate(-10,140,340)"/>
  <ellipse cx="280" cy="330" rx="30" ry="12" fill="rgba(220,150,140,0.05)" transform="rotate(-10,280,330)"/>
  <ellipse cx="420" cy="340" rx="30" ry="12" fill="rgba(255,245,210,0.05)" transform="rotate(-10,420,340)"/>

  <!-- Top decorative glow -->
  <ellipse cx="300" cy="100" rx="200" ry="100" fill="rgba(255,200,100,0.03)"/>
</svg>