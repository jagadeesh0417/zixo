<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="odBase" cx="48%" cy="42%" r="52%" fx="45%" fy="38%">
      <stop offset="0%" stop-color="#3D2B1A"/>
      <stop offset="25%" stop-color="#2E1E10"/>
      <stop offset="55%" stop-color="#1F1208"/>
      <stop offset="80%" stop-color="#150C05"/>
      <stop offset="100%" stop-color="#0C0603"/>
    </radialGradient>
    <radialGradient id="odHighlight" cx="38%" cy="35%" r="45%">
      <stop offset="0%" stop-color="rgba(120,90,70,0.2)"/>
      <stop offset="40%" stop-color="rgba(80,60,50,0.08)"/>
      <stop offset="100%" stop-color="rgba(50,35,25,0)"/>
    </radialGradient>
    <radialGradient id="creamFilling" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#F8F6F0"/>
      <stop offset="100%" stop-color="#EAE4D8"/>
    </radialGradient>
    <radialGradient id="odBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="100%" stop-color="#0E0A08"/>
    </radialGradient>
    <filter id="shadowOD">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="creamShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="pieceShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <clipPath id="odClip">
      <path d="M195,415 C180,360 205,300 265,270 C300,250 345,238 395,240 C440,243 480,253 520,275 C570,303 605,343 617,400 C630,460 613,510 575,543 C543,570 497,580 450,583 C395,585 340,573 295,550 C243,523 210,480 195,415Z"/>
    </clipPath>
  </defs>

  <rect width="800" height="800" fill="url(#odBg)"/>
  <ellipse cx="400" cy="590" rx="350" ry="55" fill="rgba(255,255,255,0.03)"/>
  <ellipse cx="400" cy="585" rx="280" ry="48" fill="rgba(0,0,0,0.55)" filter="url(#shadowOD)"/>

  <!-- Cookie body -->
  <path d="M195,415 C180,360 205,300 265,270 C300,250 345,238 395,240 C440,243 480,253 520,275 C570,303 605,343 617,400 C630,460 613,510 575,543 C543,570 497,580 450,583 C395,585 340,573 295,550 C243,523 210,480 195,415Z"
        fill="url(#odBase)" filter="url(#shadowOD)"/>
  <path d="M195,415 C180,360 205,300 265,270 C300,250 345,238 395,240 C440,243 480,253 520,275 C570,303 605,343 617,400 C630,460 613,510 575,543 C543,570 497,580 450,583 C395,585 340,573 295,550 C243,523 210,480 195,415Z"
        fill="url(#odHighlight)"/>

  <!-- Texture -->
  <g stroke="#2E1E10" stroke-width="1.5" fill="none" opacity="0.25" clip-path="url(#odClip)">
    <path d="M305,350 L330,375 L320,400"/>
    <path d="M445,300 L470,335 L460,365"/>
    <path d="M365,450 L395,465 L415,448"/>
    <path d="M275,440 L300,455"/>
    <path d="M535,370 L560,385"/>
  </g>

  <!-- Oreo cookie pieces (crushed) -->
  <path d="M280,320 C290,308 306,312 302,328 C298,342 278,336 280,320Z" fill="url(#odBase)" filter="url(#pieceShadow)"/>
  <path d="M460,340 C470,326 486,330 482,348 C478,362 458,356 460,340Z" fill="url(#odBase)" filter="url(#pieceShadow)"/>
  <path d="M510,430 C520,416 536,420 532,438 C528,452 508,446 510,430Z" fill="url(#odBase)" filter="url(#pieceShadow)"/>
  <path d="M350,380 C358,368 370,371 367,385 C364,396 350,392 350,380Z" fill="url(#odBase)" filter="url(#pieceShadow)"/>
  <path d="M420,295 C428,283 440,286 437,300 C434,311 420,307 420,295Z" fill="url(#odBase)" filter="url(#pieceShadow)"/>

  <!-- Cream filling dollops -->
  <ellipse cx="340" cy="355" rx="25" ry="15" fill="url(#creamFilling)" filter="url(#creamShadow)" transform="rotate(-10,340,355)"/>
  <ellipse cx="440" cy="380" rx="28" ry="16" fill="url(#creamFilling)" filter="url(#creamShadow)" transform="rotate(5,440,380)"/>
  <ellipse cx="380" cy="440" rx="22" ry="13" fill="url(#creamFilling)" filter="url(#creamShadow)" transform="rotate(-5,380,440)"/>
  <ellipse cx="480" cy="450" rx="20" ry="12" fill="url(#creamFilling)" filter="url(#creamShadow)" transform="rotate(8,480,450)"/>
  <ellipse cx="300" cy="410" rx="18" ry="10" fill="url(#creamFilling)" filter="url(#creamShadow)" transform="rotate(-12,300,410)"/>
  <ellipse cx="400" cy="320" rx="20" ry="11" fill="url(#creamFilling)" filter="url(#creamShadow)" transform="rotate(3,400,320)"/>

  <!-- Oreo crumb sprinkles -->
  <g fill="#1F1208" opacity="0.7">
    <circle cx="320" cy="380" r="3"/>
    <circle cx="360" cy="360" r="2.5"/>
    <circle cx="410" cy="350" r="2"/>
    <circle cx="460" cy="400" r="3"/>
    <circle cx="350" cy="420" r="2.5"/>
    <circle cx="430" cy="430" r="2"/>
    <circle cx="500" cy="410" r="2.5"/>
    <circle cx="290" cy="370" r="2"/>
    <circle cx="380" cy="300" r="2.5"/>
    <circle cx="470" cy="360" r="3"/>
    <circle cx="330" cy="450" r="2"/>
    <circle cx="520" cy="380" r="2"/>
  </g>

  <!-- Cream highlights -->
  <g opacity="0.6" fill="#fff">
    <ellipse cx="335" cy="350" rx="8" ry="4" transform="rotate(-10,335,350)"/>
    <ellipse cx="435" cy="375" rx="9" ry="4" transform="rotate(5,435,375)"/>
    <ellipse cx="375" cy="435" rx="7" ry="3" transform="rotate(-5,375,435)"/>
  </g>

  <!-- Specular highlights -->
  <ellipse cx="355" cy="305" rx="55" ry="25" fill="rgba(120,90,70,0.06)" transform="rotate(-15,355,305)"/>
  <path d="M265,270 C300,250 345,238 395,240 C440,243 480,253 520,275"
        fill="none" stroke="rgba(150,120,100,0.1)" stroke-width="3"/>
</svg>