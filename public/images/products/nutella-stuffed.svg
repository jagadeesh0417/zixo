<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="nsBase" cx="48%" cy="42%" r="52%" fx="45%" fy="38%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="20%" stop-color="#4A2C14"/>
      <stop offset="50%" stop-color="#3A1E0C"/>
      <stop offset="80%" stop-color="#281408"/>
      <stop offset="100%" stop-color="#180C04"/>
    </radialGradient>
    <radialGradient id="nsHighlight" cx="38%" cy="35%" r="45%">
      <stop offset="0%" stop-color="rgba(140,100,70,0.2)"/>
      <stop offset="40%" stop-color="rgba(100,70,50,0.08)"/>
      <stop offset="100%" stop-color="rgba(60,40,30,0)"/>
    </radialGradient>
    <radialGradient id="nutellaCenter" cx="50%" cy="45%" r="50%" fx="48%" fy="42%">
      <stop offset="0%" stop-color="#3C2010"/>
      <stop offset="30%" stop-color="#2E1508"/>
      <stop offset="60%" stop-color="#1F0E04"/>
      <stop offset="100%" stop-color="#140902"/>
    </radialGradient>
    <radialGradient id="nutellaGloss" cx="45%" cy="38%" r="40%">
      <stop offset="0%" stop-color="rgba(180,140,100,0.2)"/>
      <stop offset="50%" stop-color="rgba(140,100,70,0.08)"/>
      <stop offset="100%" stop-color="rgba(100,70,50,0)"/>
    </radialGradient>
    <radialGradient id="nsBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A100A"/>
      <stop offset="100%" stop-color="#0E0805"/>
    </radialGradient>
    <filter id="shadowNS">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="oozingShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glossFilter">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="nsClip">
      <path d="M195,415 C180,360 205,300 265,270 C300,250 345,238 395,240 C440,243 480,253 520,275 C570,303 605,343 617,400 C630,460 613,510 575,543 C543,570 497,580 450,583 C395,585 340,573 295,550 C243,523 210,480 195,415Z"/>
    </clipPath>
  </defs>

  <rect width="800" height="800" fill="url(#nsBg)"/>
  <ellipse cx="400" cy="590" rx="350" ry="55" fill="rgba(255,255,255,0.03)"/>
  <ellipse cx="400" cy="585" rx="280" ry="48" fill="rgba(0,0,0,0.55)" filter="url(#shadowNS)"/>

  <!-- Cookie body -->
  <path d="M195,415 C180,360 205,300 265,270 C300,250 345,238 395,240 C440,243 480,253 520,275 C570,303 605,343 617,400 C630,460 613,510 575,543 C543,570 497,580 450,583 C395,585 340,573 295,550 C243,523 210,480 195,415Z"
        fill="url(#nsBase)" filter="url(#shadowNS)"/>
  <path d="M195,415 C180,360 205,300 265,270 C300,250 345,238 395,240 C440,243 480,253 520,275 C570,303 605,343 617,400 C630,460 613,510 575,543 C543,570 497,580 450,583 C395,585 340,573 295,550 C243,523 210,480 195,415Z"
        fill="url(#nsHighlight)"/>

  <!-- Oozing Nutella -->
  <path d="M330,380 C320,400 325,430 340,445 C355,460 360,475 350,490"
        fill="none" stroke="url(#nutellaCenter)" stroke-width="20" stroke-linecap="round" opacity="0.7" filter="url(#oozingShadow)"/>
  <path d="M440,370 C450,390 455,410 448,430 C440,450 445,465 455,475"
        fill="none" stroke="url(#nutellaCenter)" stroke-width="18" stroke-linecap="round" opacity="0.6" filter="url(#oozingShadow)"/>
  <path d="M380,500 C370,510 365,525 375,535"
        fill="none" stroke="url(#nutellaCenter)" stroke-width="15" stroke-linecap="round" opacity="0.5" filter="url(#oozingShadow)"/>

  <!-- Nutella center pool -->
  <ellipse cx="400" cy="420" rx="70" ry="40" fill="url(#nutellaCenter)" filter="url(#oozingShadow)"/>
  <ellipse cx="400" cy="420" rx="70" ry="40" fill="url(#nutellaGloss)"/>

  <!-- Nutella glossy spot -->
  <ellipse cx="385" cy="408" rx="25" ry="12" fill="rgba(200,160,120,0.12)"/>
  <ellipse cx="380" cy="405" rx="12" ry="6" fill="rgba(220,180,140,0.08)"/>

  <!-- Texture cracks around edge -->
  <g stroke="#3A1E0C" stroke-width="1.5" fill="none" opacity="0.2" clip-path="url(#nsClip)">
    <path d="M305,350 L330,375 L320,395"/>
    <path d="M445,300 L470,335 L460,365"/>
    <path d="M495,410 L520,435 L510,455"/>
    <path d="M275,440 L300,455"/>
    <path d="M535,370 L560,385"/>
    <path d="M260,385 L280,400"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="360" cy="305" rx="55" ry="25" fill="rgba(140,100,70,0.06)" transform="rotate(-15,360,305)"/>
  <path d="M265,270 C300,250 345,238 395,240 C440,243 480,253 520,275"
        fill="none" stroke="rgba(160,120,90,0.1)" stroke-width="3"/>
</svg>