<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="clBg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#3A2018"/>
      <stop offset="50%" stop-color="#24120C"/>
      <stop offset="100%" stop-color="#140A06"/>
    </radialGradient>
    <radialGradient id="clCookie1" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4A2A18"/>
      <stop offset="40%" stop-color="#2A1208"/>
      <stop offset="100%" stop-color="#120804"/>
    </radialGradient>
    <radialGradient id="clCookie2" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3A2010"/>
      <stop offset="40%" stop-color="#1E0C04"/>
      <stop offset="100%" stop-color="#080402"/>
    </radialGradient>
    <radialGradient id="clCookie3" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5C3A1E"/>
      <stop offset="40%" stop-color="#3A1E0C"/>
      <stop offset="100%" stop-color="#180C04"/>
    </radialGradient>
    <radialGradient id="clCookie4" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6E4828"/>
      <stop offset="40%" stop-color="#4A2C14"/>
      <stop offset="100%" stop-color="#241208"/>
    </radialGradient>
    <linearGradient id="clGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="rgba(218,165,32,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="clShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="clTextGlow">
      <feGaussianBlur stdDeviation="1.5"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#clBg)"/>
  <ellipse cx="400" cy="520" rx="350" ry="60" fill="rgba(255,255,255,0.02)"/>

  <!-- Cookie arrangement -->
  <ellipse cx="260" cy="380" rx="100" ry="38" fill="url(#clCookie1)" filter="url(#clShadow)"/>
  <ellipse cx="420" cy="370" rx="105" ry="40" fill="url(#clCookie2)" filter="url(#clShadow)"/>
  <ellipse cx="560" cy="385" rx="95" ry="36" fill="url(#clCookie3)" filter="url(#clShadow)"/>
  <ellipse cx="340" cy="330" rx="90" ry="34" fill="url(#clCookie4)" filter="url(#clShadow)"/>
  <ellipse cx="490" cy="320" rx="85" ry="32" fill="url(#clCookie1)" filter="url(#clShadow)"/>

  <!-- Background cookies -->
  <ellipse cx="200" cy="340" rx="80" ry="30" fill="url(#clCookie2)" filter="url(#clShadow)" opacity="0.6"/>
  <ellipse cx="630" cy="340" rx="80" ry="30" fill="url(#clCookie3)" filter="url(#clShadow)" opacity="0.6"/>

  <!-- Text -->
  <text x="400" y="160" font-family="Georgia, serif" font-size="36" fill="#FFF8E0" text-anchor="middle" font-weight="bold" filter="url(#clTextGlow)" letter-spacing="3">Chocolate Lovers</text>
  <rect x="280" y="175" width="240" height="1" fill="url(#clGold)"/>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,235,210,0.4)" text-anchor="middle" letter-spacing="4">FOR THE TRUE CHOCOHOLIC</text>

  <!-- Bottom fade -->
  <rect x="0" y="500" width="800" height="100" fill="url(#clBg)" opacity="0.6"/>
</svg>